# writen by gemini

name: Build and Deploy Skia Wasm
on:
  push:
    branches: [ main ] # Runs every time you push to main

permissions:
  contents: write # Required to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Fetch Skia Binaries
        run: |
          # We search specifically for the emscripten target in the releases
          # Using 'skia-binaries' as the search term to catch the new naming format
          ASSET_URL=$(gh release view --repo rust-skia/skia-binaries 0.77.1 --json assets \
            -q '.assets[] | select(.name | contains("wasm32-unknown-emscripten")) | .url' | head -n 1)
          
          if [ -z "$ASSET_URL" ]; then
            echo "Fallback: Searching latest release..."
            ASSET_URL=$(gh release view --repo rust-skia/skia-binaries --json assets \
              -q '.assets[] | select(.name | contains("wasm32-unknown-emscripten")) | .url' | head -n 1)
          fi

          if [ -z "$ASSET_URL" ]; then
            echo "Error: Still could not find Wasm binary. Check rust-skia/skia-binaries for available assets."
            exit 1
          fi
          
          echo "Downloading: $ASSET_URL"
          mkdir -p third_party/skia
          curl -L "$ASSET_URL" -o skia.tar.gz
          tar -xzf skia.tar.gz -C third_party/skia



      - name: Compile C++ to Wasm
        run: |
          # Create a 'dist' folder for the final website files
          mkdir -p dist
          # Move your existing HTML/CSS into dist
          cp index.html dist/ 2>/dev/null || : 
          

          emcc src/*.cpp \
            -Ithird_party/skia/include \
            -Lthird_party/skia/out/Release \
            -lskia -lGL \
            -s WASM=1 \
            -s USE_WEBGL2=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            --bind \
            -o dist/skia_app.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # This is the folder that gets turned into a website
          branch: gh-pages # The hidden branch for your .wasm files
