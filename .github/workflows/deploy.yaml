# writen by gemini

name: Build and Deploy Skia Wasm
on:
  push:
    branches: [ main ] # Runs every time you push to main

permissions:
  contents: write # Required to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Fetch Skia Binaries
        run: |
          mkdir -p third_party/skia
          # We download a specific version (0.67.1) known to have Wasm binaries
          # The -L flag follows redirects, which is critical for GitHub Releases
          curl -L "https://github.com" -o skia.tar.gz
          
          # Check if it's actually a gzip file before extracting
          if file skia.tar.gz | grep -q 'gzip compressed data'; then
            tar -xzf skia.tar.gz -C third_party/skia
          else
            echo "Error: Downloaded file is not a valid tar.gz. Check the URL."
            exit 1
          fi

      - name: Compile C++ to Wasm
        run: |
          # Create a 'dist' folder for the final website files
          mkdir -p dist
          # Move your existing HTML/CSS into dist
          cp index.html dist/ 2>/dev/null || : 
          

          emcc src/*.cpp \
            -Ithird_party/skia/include \
            -Lthird_party/skia/out/Release \
            -lskia -lGL \
            -s WASM=1 \
            -s USE_WEBGL2=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            --bind \
            -o dist/skia_app.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # This is the folder that gets turned into a website
          branch: gh-pages # The hidden branch for your .wasm files
