# writen by gemini

name: Build and Deploy Skia Wasm
on:
  push:
    branches: [ main ] # Runs every time you push to main

permissions:
  contents: write # Required to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Fetch Skia Binaries
        run: |
          echo "Searching for valid Skia Wasm binary in recent releases..."
          
          # 1. Get the 10 most recent release tags
          TAGS=$(gh release list --repo rust-skia/skia-binaries --limit 10 --exclude-drafts --exclude-pre-releases --json tagName -q '.[].tagName')
          
          ASSET_URL=""
          
          # 2. Loop through tags to find one with a Wasm asset
          for TAG in $TAGS; do
            echo "Checking release: $TAG"
            # Look for an asset containing 'wasm32-unknown-emscripten'
            # We filter for 'GPL' or feature sets if needed, but usually just the arch is enough
            URL=$(gh release view --repo rust-skia/skia-binaries "$TAG" --json assets \
              -q '.assets[] | select(.name | contains("wasm32-unknown-emscripten")) | .url' | head -n 1)
            
            if [ -n "$URL" ]; then
              echo "✅ Found Wasm binary in release $TAG"
              ASSET_URL="$URL"
              break
            else
              echo "❌ No Wasm binary in $TAG, skipping..."
            fi
          done
          
          # 3. Fail if still nothing found
          if [ -z "$ASSET_URL" ]; then
            echo "Error: Checked last 10 releases and found no 'wasm32-unknown-emscripten' binaries."
            exit 1
          fi
          
          # 4. Download and Extract
          echo "Downloading: $ASSET_URL"
          mkdir -p third_party/skia
          curl -L "$ASSET_URL" -o skia.tar.gz
          tar -xzf skia.tar.gz -C third_party/skia
          
          # 5. (Optional) Fix directory structure if tarball structure varies
          # Sometimes it unzips into a subdir. Ensure includes are where we expect.
          if [ -d "third_party/skia/skia" ]; then
            mv third_party/skia/skia/* third_party/skia/
            rmdir third_party/skia/skia
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}



      - name: Compile C++ to Wasm
        run: |
          # Create a 'dist' folder for the final website files
          mkdir -p dist
          # Move your existing HTML/CSS into dist
          cp index.html dist/ 2>/dev/null || : 
          

          emcc src/*.cpp \
            -Ithird_party/skia/include \
            -Lthird_party/skia/out/Release \
            -lskia -lGL \
            -s WASM=1 \
            -s USE_WEBGL2=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            --bind \
            -o dist/skia_app.js

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # This is the folder that gets turned into a website
          branch: gh-pages # The hidden branch for your .wasm files
