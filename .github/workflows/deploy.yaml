# writen by gemini

name: Build and Deploy Skia Wasm
on:
  push:
    branches: [ main ] # Runs every time you push to main

permissions:
  contents: write # Required to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Download and Extract Skia Wasm Binaries
        run: |
          # Specific version and filename from rust-skia releases
          TAG="0.88.0"
          # This specific hash includes freetype and textlayout support
          FILE="skia-binaries-5389650d995c645e2270-wasm32-unknown-emscripten-freetype-textlayout.tar.gz"
          URL="https://github.com"
          
          echo "Fetching from $URL"
          
          # -f ensures it fails if the file is missing (no 404 HTML download)
          curl -f -L -o skia.tar.gz "$URL"
          
          # Verify file type before extracting
          if file skia.tar.gz | grep -q 'gzip compressed data'; then
            mkdir -p ./skia-lib
            tar -xzf skia.tar.gz -C ./skia-lib
            echo "Successfully extracted Skia binaries."
          else
            echo "ERROR: Download failed or file is corrupt."
            exit 1
          fi


      - name: Compile C++ to Wasm
        run: |
          # Create a 'dist' folder for the final website files
          mkdir -p dist
          # Move your existing HTML/CSS into dist
          cp index.html dist/ 2>/dev/null || : 
          
          emcc src/*.cpp \
            -I./skia-lib/skia/include \
            -I./skia-lib/skia/include/core \
            -L./skia-lib/skia/out/Release \
            -lskia \
            -s WASM=1 \
            -s USE_WEBGL2=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            --bind \
            -o dist/skia_app.js


      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # This is the folder that gets turned into a website
          branch: gh-pages # The hidden branch for your .wasm files
