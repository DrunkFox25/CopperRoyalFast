# writen by gemini

name: Build and Deploy Skia Wasm
on:
  push:
    branches: [ main ] # Runs every time you push to main

permissions:
  contents: write # Required to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Download Skia Binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use gh to download the exact file from the rust-skia repo
          # This handles auth and redirects better than a raw curl
          gh release download 0.93.1 \
            --repo rust-skia/skia-binaries \
            --pattern "skia-binaries-319323662b1685a112f5-wasm32-unknown-emscripten-gl-jpegd-jpege-pdf-svg-textlayout-webpd-webpe.tar.gz" \
            --output skia.tar.gz

          # Verify it's a real archive (prevents the 'not in gzip format' error)
          if ! file skia.tar.gz | grep -q 'gzip compressed data'; then
            echo "ERROR: Downloaded file is not a valid gzip!"
            exit 1
          fi

          mkdir -p ./skia-lib
          tar -xzf skia.tar.gz -C ./skia-lib
      
      - name: Copy Skia Include Directory
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com ./skia-lib/skia
          cd ./skia-lib/skia
          git sparse-checkout set include
          rm -rf .git

      - name: Verify Paths
        run: |
          echo "Looking for libskia.a..."
          find ./skia-lib -name "libskia.a"
          echo "Looking for SkCanvas.h..."
          find ./skia-lib -name "SkCanvas.h"



      - name: Compile C++ to Wasm
        run: |
          # Create a 'dist' folder for the final website files
          mkdir -p dist
          # Move your existing HTML/CSS into dist
          cp index.html dist/ 2>/dev/null || : 
          
          emcc src/*.cpp \
            -I./skia-lib/skia/include \
            -I./skia-lib/skia/include/core \
            -I./skia-lib/skia/include/config \
            -I./skia-lib/skia/include/utils \
            -L./skia-lib/skia \
            -lskia \
            -s WASM=1 -s USE_WEBGL2=1 -s ALLOW_MEMORY_GROWTH=1 \
            -DSK_GL -DSK_GANESH -DSK_PDF -DSK_SHAPER_HARFBUZZ_AVAILABLE -DSK_UNICODE_ICU_AVAILABLE \
            --bind \
            -o dist/skia_app.js



      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # This is the folder that gets turned into a website
          branch: gh-pages # The hidden branch for your .wasm files
