# writen by gemini

name: Build and Deploy Skia Wasm
on:
  push:
    branches: [ main ] # Runs every time you push to main

permissions:
  contents: write # Required to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Download and Extract Skia Wasm Binaries
        run: |
          # Set the version you want
          SKIA_VERSION="0.79.0"
          
          # Download the tarball from rust-skia releases
          curl -L -o skia-binaries.tar.gz \
            https://github.com
          
          # Create a directory and extract
          mkdir -p ./skia-lib
          tar -xzf skia-binaries.tar.gz -C ./skia-lib
          
          # List files to verify (you should see libskia.a and headers)
          ls -R ./skia-lib

      - name: Verify Binary
        run: |
          # Check if the static library exists
          test -f ./skia-lib/libskia.a && echo "Skia binary found!"


      - name: Compile C++ to Wasm
        run: |
          # Create a 'dist' folder for the final website files
          mkdir -p dist
          # Move your existing HTML/CSS into dist
          cp index.html dist/ 2>/dev/null || : 
          
          emcc src/*.cpp \
            -I./skia-lib/skia/include \
            -I./skia-lib/skia/include/core \
            -L./skia-lib/skia/out/Release \
            -lskia \
            -s WASM=1 \
            -s USE_WEBGL2=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            --bind \
            -o dist/skia_app.js


      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # This is the folder that gets turned into a website
          branch: gh-pages # The hidden branch for your .wasm files
