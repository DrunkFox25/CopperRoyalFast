# writen by gemini

name: Build and Deploy Skia Wasm
on:
  push:
    branches: [ main ] # Runs every time you push to main

permissions:
  contents: write # Required to push to the gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.51

      - name: Download and Extract Skia Wasm Binaries
        run: |
          # Use a verified version and the exact hash for the wasm target
          TAG="0.62.0"
          HASH="8cf4841aefdb295709e9"
          FILE="skia-binaries-$HASH-wasm32-unknown-emscripten-freetype-textlayout-webpd.tar.gz"
          URL="https://github.com"
          
          echo "Attempting download from: $URL"
          
          # -f makes curl fail (exit code 22) if the URL is a 404, stopping the script before tar runs
          curl -f -L -o skia-binaries.tar.gz "$URL"
          
          # Verification before extraction
          if file skia-binaries.tar.gz | grep -q 'gzip compressed data'; then
            mkdir -p ./skia-lib
            tar -xzf skia-binaries.tar.gz -C ./skia-lib
            echo "Successfully extracted Skia."
            # Debug: See exactly where libskia.a landed
            find ./skia-lib -name "libskia.a"
          else
            echo "ERROR: File is not a gzip. Content of downloaded file:"
            cat skia-binaries.tar.gz | head -n 20
            exit 1
          fi



      - name: Compile C++ to Wasm
        run: |
          # Create a 'dist' folder for the final website files
          mkdir -p dist
          # Move your existing HTML/CSS into dist
          cp index.html dist/ 2>/dev/null || : 
          
          emcc src/*.cpp \
            -I./skia-lib/skia/include \
            -I./skia-lib/skia/include/core \
            -L./skia-lib/skia/out/Release \
            -lskia \
            -s WASM=1 \
            -s USE_WEBGL2=1 \
            -s ALLOW_MEMORY_GROWTH=1 \
            --bind \
            -o dist/skia_app.js


      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # This is the folder that gets turned into a website
          branch: gh-pages # The hidden branch for your .wasm files
